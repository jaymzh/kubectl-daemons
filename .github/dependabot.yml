version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      all-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      all-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      k8s-ecosystem:
        patterns: ["k8s.io*"]

